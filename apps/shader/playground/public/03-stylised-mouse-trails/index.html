<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport"
    content="width=device-width, minimal-ui, viewport-fit=cover, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>OGL • Template</title>
  <style>
    :root {
      overflow: hidden;
      height: 100%;
    }

    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <script type="module">
    import {
      Renderer,
      Camera,
      Transform,
      Program,
      Mesh,
      Vec3,
      Polyline,
      Orbit,
      Color
    } from "https://unpkg.com/ogl";

    const vertex =
      `
          attribute vec3 position;
          attribute vec3 next;
          attribute vec3 prev;
          attribute vec2 uv;
          attribute float side;

          uniform vec2 uResolution;
          uniform float uDPR;
          uniform float uThickness;

          vec4 getPosition() {
            vec2 aspect = vec2(uResolution.x / uResolution.y, 1);
            vec2 nextScreen = next.xy * aspect;
            vec2 prevScreen = prev.xy * aspect;

            vec2 tangent = normalize(nextScreen - prevScreen);
            vec2 normal = vec2(-tangent.y, tangent.x);
            normal /= aspect;
            // normal *= 1.0 - pow(abs(uv.y - 0.5) * 2.0 ,2.0);

            // rounded
            // float d = abs(uv.y - 0.5) * 2.0;
            // normal *= sqrt(max(0.0, 1.0 - d * d));

            // wobbly
            normal *= (1.0 - abs(uv.y - 0.5) * 2.0) * 0.2;

            float pixelWidth = 1.0 / (uResolution.y / uDPR);
            normal *= pixelWidth * uThickness;

            // When the points are on top of each other, shrink the line to avoid artifacts.
                float dist = length(nextScreen - prevScreen);
                normal *= smoothstep(0.0, 0.02, dist);
            
            vec4 current = vec4(position, 1);
            current.xy -= normal * side;
            return current;
          }

          void main() {
              gl_Position = getPosition();
          }
        `;

    {
      const renderer = new Renderer({dpr: 2});
      const gl = renderer.gl;

      document.body.appendChild(gl.canvas);

      const scene = new Transform();

      const lines = [];

      function resize() {
        renderer.setSize(window.innerWidth, window.innerHeight);
        // if (polyline) polyline.resize();
        lines.forEach((line) => line.polyline.resize())
      }
      window.addEventListener("resize", resize, false);

      // Helper function
      function random(a, b) {
        const alpha = Math.random();
        return a * (1.0 - alpha) + b * alpha;
      }

      const colors = ["#ffffff", "#bbbbbb", "#555555", "#222222", "#888888"];

      // points
      const lineCount = 5;
      for (let i = 0; i < lineCount; i++) {

        const line = {
          spring: random(0.085 ,0.099), // How strongly the point is pulled toward the mouse.
          friction: random(0.7 ,0.99), // How much the movement slows down over time.
          mouseVelocity: new Vec3(), // The current speed/direction of the leading point.
          tmp: new Vec3() // A reusable temporary vector, used to avoid creating new vectors every frame.
        }

        const count = 25;
        const points = (line.points = []);
        for (let i = 0; i < count; i++) points.push(new Vec3());

        line.polyline = new Polyline(gl, {
          points,
          vertex,
          uniforms: {
            uColor: { value: new Color(colors[Math.floor(random(0, 4))])},
            uThickness: { value: random(10, 30) }
          }
        });

        line.polyline.mesh.setParent(scene);

        lines.push(line)

      }

      // resize after lines
      resize();

      // Mouse

      const mouse = new Vec3();
      if ("ontouchstart" in window) {
        window.addEventListener("touchstart", updateMouse, false);
        window.addEventListener("touchmove", updateMouse, false);
      } else {
        window.addEventListener("mousemove", updateMouse, false);
      }

      function updateMouse(e) {
        if (e.changedTouches && e.changedTouches.length) {
          e.x = e.changedTouches[0].pageX;
          e.y = e.changedTouches[0].pageY;
        }
        if (e.x === undefined) {
          e.x = e.pageX;
          e.y = e.pageY;
        }

        // Get mouse value in -1 to 1 range, with y flipped
        mouse.set(
          (e.x / gl.renderer.width) * 2 - 1,
          (e.y / gl.renderer.height) * -2 + 1,
          0
        );
      }

      // Animation

      requestAnimationFrame(update);
      function update(t) {
        requestAnimationFrame(update);        

        lines.forEach((line) => {

          for (let i = line.points.length - 1; i >= 0; i--) {
            if (!i) {
              // So the first point moves according to the spring motion.
              // classic SPRING MOTION
              // force = (mouse - position) * spring;
              // velocity = (velocity + force) * friction;
              // position = position + velocity;

              line.tmp.copy(mouse).sub(line.points[i]).multiply(line.spring);
              line.mouseVelocity.add(line.tmp).multiply(line.friction);
              line.points[i].add(line.mouseVelocity);
            } else {
              // Each point follows the previous point.
              line.points[i].lerp(line.points[i - 1], random(0.6, 0.9));
            }
          }
          line.polyline.updateGeometry();
        })



        renderer.render({ scene });
      }
    }

  </script>
</body>

</html>
